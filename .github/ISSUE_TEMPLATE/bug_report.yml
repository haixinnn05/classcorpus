name: Bug report
description: Report incorrect extraction, retrieval, or documentation.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Include the command, expected result, and actual result.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: ClassCorpus version or commit
    validations:
      required: true
  - type: dropdown
    id: format
    attributes:
      label: Source format
      options:
        - PDF
        - PPTX
        - Not source-specific
    validations:
      required: true
  - type: textarea
    id: safety
    attributes:
      label: Minimal reproduction
      description: Do not upload confidential, restricted, or copyrighted lectures.
