name: Feature request
description: Propose a focused improvement to the open-source Agent Skill.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: need
    attributes:
      label: User need
      description: Describe the lecture workflow that is currently difficult.
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
      description: Explain how success could be verified.
    validations:
      required: true
  - type: checkboxes
    id: boundaries
    attributes:
      label: Project boundaries
      options:
        - label: This remains a local Agent Skill, not an app or hosted service.
          required: true
